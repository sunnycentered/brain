# Jekyll configuration for GitHub Pages
# Deployed to: https://sunnycentered.github.io/brain/
title: "Brain Blog"
description: "Thoughts, photos, and the weird stuff in between."

# Project site (not a user site) — baseurl includes the repo name
url: "https://sunnycentered.github.io"
baseurl: "/brain"

# Source directory (relative to repo root)
source: blog-pipeline

# Build output (will be deployed by GitHub Pages)
destination: _site

# Disable GitHub's default theme — we have our own layout
theme: null

# Default layout for all posts
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post

# Markdown
markdown: kramdown

# Plugins (GitHub Pages supports these)
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-gist
  - jekyll-feed

# Exclude from build
exclude:
  - blog-pipeline/prompts
  - blog-pipeline/state
  - blog-pipeline/logs
  - README.md
  - config.json
