# Jekyll configuration for GitHub Pages
title: "Brain Blog"
description: "Thoughts, photos, and the weird stuff in between."
baseurl: "/brain"
url: "https://sunnycentered.github.io"

# Source is the blog-pipeline directory (GitHub Pages looks for _config.yml at repo root)
source: blog-pipeline

# Build output
destination: _site

# Default layout for all posts
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post

# Markdown
markdown: kramdown

# Plugins (GitHub Pages supports these)
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-gist

# Exclude from build
exclude:
  - blog-pipeline/prompts
  - blog-pipeline/state
  - blog-pipeline/logs
  - README.md
  - config.json
