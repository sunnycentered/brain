# Jekyll configuration for GitHub Pages
title: "Brain Blog"
description: "Thoughts, photos, and the weird stuff in between."
baseurl: "/brain"
url: "https://sunnycentered.github.io"

# Posts live in this directory (relative to _config.yml)
source: .
destination: _site

# Default layout for posts
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post

# Markdown
markdown: kramdown

# Plugins (GitHub Pages supports these)
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-gist

# Exclude from build
exclude:
  - prompts
  - state
  - logs
  - config.json
