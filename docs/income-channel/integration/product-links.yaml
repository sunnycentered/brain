## Integration Notes for Bot Code

In `server/services/productAnalytics.js`:

```javascript
// Track Telegram bot interactions with the product
async function trackTelegramCommand(command, chatId, userId) {
  await logEvent({
    type: 'telegram_command',
    command,          // '/pricing', '/buy', etc.
    chatId,
    userId,
    timestamp: Date.now(),
    source: 'telegram_bot'
  });
  
  if (['/buy', '/premium', '/bundle', '/basic'].includes(command)) {
    trackConversion({ command, chatId, userId });
  }
}

// Track Gumroad conversion events
async function trackGumroadConversion(productId, tier, amount) {
  await logEvent({
    type: 'gumroad_purchase',
    productId: 'nomad-starter-pack',
    tier,
    amount,
    timestamp: Date.now()
  });
}

// Track PDF views and downloads
async function trackProductViews(pageViews, uniqueVisitors) {
  await logEvent({
    type: 'product_page_views',
    pageViews,
    uniqueVisitors,
    timestamp: Date.now()
  });
}

// Track refund events
async function trackRefund(productId, reason) {
  await logEvent({
    type: 'gumroad_refund',
    productId,
    reason,
    timestamp: Date.now()
  });
}
```

