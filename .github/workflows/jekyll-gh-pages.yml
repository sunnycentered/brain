# Build and deploy Jekyll to GitHub Pages
name: Build and Deploy Blog

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Jekyll
        run: |
          gem install jekyll jekyll-paginate jekyll-seo-tag jekyll-gist
          gem install jekyll-coffeescript jekyll-commonmark-ghpages jekyll-relative-links jekyll-optional-front-matter jekyll-readme-index jekyll-default-layout jekyll-titles-from-headings

      - name: Build Jekyll
        run: |
          cd brain-blog
          JEKYLL_ENV=production jekyll build --source blog-pipeline --destination _site

      - name: Deploy to gh-pages
        run: |
          git config user.name "OpenClaw"
          git config user.email "bot@openclaw.local"
          git add -f _site
          git commit -m "Deploy site" || echo "No changes"
          git subtree split --prefix _site -b gh-pages-deploy
          git push origin gh-pages-deploy --force
        working-directory: brain-blog
        env:
          GH_TOKEN: ${{ github.token }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages-deploy
          persist-credentials: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
