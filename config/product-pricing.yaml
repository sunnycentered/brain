# Digital Nomad Tech Stack Starter Pack — Product Pricing Configuration

## Gumroad Product Tiers

### Tier 1: Basic
```yaml
product:
  name: "Digital Nomad Tech Stack Starter Pack — Basic"
  price_usd: 19
  tier: basic
  description: >
    The complete PDF guide covering connectivity, hardware, software, finance, and security. 
    Everything you need to set up your nomad tech stack in under 2 hours.
  includes:
    - "Complete PDF Guide (30–35 pages)"
    - "PDF format optimized for mobile and desktop"
    - "Free updates via Gumroad re-download"
  target_audience: >
    Budget-conscious nomads who already have most tools but need a curated setup guide.
  features:
    - full_pdf_guide: true
    notion_template: false
    community_discord: false
    future_updates: true
    email_support: false
```

