## Psychological Pricing Notes
- $19 — lowest common denominator for impulse digital purchases under $20
- $39 — premium price point that signals quality while still feeling affordable; expected best-seller
- $59 — anchor price at ~$40 above premium creates strong perceived value for the community + updates component

## Payment Processing via Gumroad
- All tiers processed through Gumroad checkout (Stripe-powered)
- Gumroad takes 10% transaction fee on free plan or 2.9% + $0.30 on paid plans
- Recommended: Upgrade to Gumroad Creator ($15/mo) to reduce fees and unlock custom domains
- Payouts via Stripe bank transfer (available in 46+ countries, including Wise-linked accounts)

